# 本文件定义了两个服务：
# 1. db：MySQL 8.4 数据库
# 2. app：Node.js 应用
#
# 在本目录执行以下命令可构建并在后台启动两个服务：
#   docker compose up -d --build
#
# 注意：
# - “--build”会在启动前重新构建 app 镜像。
# - “-d”表示容器在后台运行。
# - 普通的“docker compose down”会删除容器和网络，但会保留底部声明的数据卷。
# - 删除 mysql_data 数据卷会永久清除数据库数据，请谨慎操作。

services:
  # MySQL 数据库服务。
  # 在 Compose 内部网络中，应用通过服务名“db”和容器端口 3306 访问它。
  db:
    # 使用官方 MySQL 8.4 镜像；本机没有该镜像时，Docker 会自动下载。
    image: mysql:8.4

    # 固定容器名称，便于通过“docker logs zongce-mysql”等命令查看容器。
    # 如果本机已存在同名容器，创建时会发生名称冲突。
    container_name: zongce-mysql

    # 容器异常退出或 Docker 重启后自动重启；
    # 如果容器是人工停止的，则不会自动重启，直到 Docker 服务再次重启或手动启动。
    restart: unless-stopped

    # 这些变量由 MySQL 官方镜像在“首次初始化空数据目录”时读取。
    # ${变量名:-默认值} 表示优先读取本机 .env；没有配置时才使用演示默认值。
    # 正式部署必须在 .env 中覆盖密码，且不得把 .env 提交到 Git。
    environment:
      # MySQL root 管理员密码。
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}

      # 首次初始化时自动创建的业务数据库。
      MYSQL_DATABASE: ${DB_NAME:-bnuai_zongce}

      # 首次初始化时自动创建的普通业务用户及其密码。
      MYSQL_USER: ${DB_USER:-zongce}
      MYSQL_PASSWORD: ${DB_PASSWORD:-zongce123}

    # 端口格式为“宿主机端口:容器端口”。
    # 因此本机可通过 127.0.0.1:3307 访问容器内的 MySQL 3306。
    # 如果本机 3307 已被其他程序或容器占用，数据库容器将无法启动。
    ports:
      - "${DB_PORT:-3307}:3306"

    volumes:
      # 将 MySQL 数据目录保存到命名数据卷。
      # 重建或删除容器不会丢失数据库数据，只要 mysql_data 数据卷仍然存在。
      - mysql_data:/var/lib/mysql

      # 将建表脚本放入 MySQL 官方镜像的自动初始化目录。
      # 仅当 /var/lib/mysql 是全新、未初始化的数据目录时才会自动执行。
      # 文件名前缀决定执行顺序：先执行 01-schema.sql，再执行 02-ai-audit.sql。
      # 数据卷初始化完成后，再次执行 docker compose up 不会重复运行这些 SQL。
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/006_ai_audit.sql:/docker-entrypoint-initdb.d/02-ai-audit.sql

    # 定期检查 MySQL 是否已经可以接受连接。
    # app 服务会等待此检查通过后再启动。
    healthcheck:
      # 强制通过 TCP 连接 127.0.0.1:3306。
      # 不使用 localhost/socket，避免 MySQL 临时初始化进程被误判为正式数据库已就绪。
      test: ["CMD-SHELL", "mysqladmin ping --protocol=TCP -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]

      # 每 10 秒检查一次，每次最多等待 5 秒。
      interval: 10s
      timeout: 5s

      # 连续失败 10 次后将容器标记为 unhealthy。
      retries: 10

      # 容器启动后的前 30 秒作为初始化宽限期，避免初始化数据库时过早判定失败。
      start_period: 30s

  # Node.js 应用服务。
  app:
    # 使用当前目录中的 Dockerfile 构建应用镜像。
    # 执行 docker compose up --build 时会重新构建此镜像。
    build: .

    # 固定应用容器名称。
    container_name: zongce-app

    # 应用异常退出或 Docker 重启后自动重启。
    restart: unless-stopped

    # 将本机 5173 端口映射到容器内的应用端口 5173。
    # 启动成功后可访问 http://localhost:5173。
    # 如果本机 5173 已被占用，应用容器将无法启动。
    ports:
      - "${PORT:-5173}:5173"

    # 传给 Node.js 应用的运行环境变量。
    # 这里的 DB_HOST 必须写 Compose 服务名“db”，不能写 localhost：
    # 在 app 容器中，localhost 指 app 容器自身，而不是 MySQL 容器。
    environment:
      DB_HOST: db

      # 容器之间走内部网络，因此使用 MySQL 容器端口 3306，而不是宿主机端口 3307。
      DB_PORT: 3306
      DB_USER: ${DB_USER:-zongce}
      DB_PASSWORD: ${DB_PASSWORD:-zongce123}
      DB_NAME: ${DB_NAME:-bnuai_zongce}

      # 应用监听端口和地址。
      # 0.0.0.0 表示监听容器的所有网络接口，宿主机端口映射才能访问该服务。
      PORT: 5173
      BIND_HOST: 0.0.0.0

      # AI 审核配置。真实密钥只从本机 .env 传入，不写入源码和镜像。
      # 未配置 AI_API_KEY 时，普通申报、人工审核和核算仍可使用，AI 审核会记录为失败。
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://ws-uwiff5b8ww2vs5zv.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      AI_MODEL: ${AI_MODEL:-qwen-vl-max}

    volumes:
      # 持久化用户上传的材料；重建应用容器后上传文件仍然保留。
      - uploads_data:/app/uploads

    # 控制启动依赖：只有 db 的健康检查通过后，Compose 才启动 app。
    # 这不会在已有数据库上重复执行初始化 SQL，也不等同于数据库迁移。
    depends_on:
      db:
        condition: service_healthy

# 声明本项目使用的两个命名数据卷。
# Docker 会在首次启动时自动创建它们，并在普通 down/up、容器重建之间保留数据。
volumes:
  # 保存 MySQL 的全部数据库文件。
  mysql_data:

  # 保存应用上传的材料文件。
  uploads_data:
